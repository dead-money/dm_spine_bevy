name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dm_spine_bevy
        uses: actions/checkout@v4
        with:
          path: dm_spine_bevy

      # Path-dep on dm_spine_runtime as a sibling clone; matches the
      # workspace layout documented in dm_spine_bevy/Cargo.toml.
      - name: Checkout dm_spine_runtime
        uses: actions/checkout@v4
        with:
          repository: dead-money/dm_spine_runtime
          path: dm_spine_runtime

      # spine-runtimes is needed by examples + by the runtime crate's
      # render_smoke test (which runs as part of `cargo test` on the
      # path-dep above). Examples themselves are not exercised by
      # `cargo test` but the dep tree must compile.
      - name: Checkout spine-runtimes (upstream)
        uses: actions/checkout@v4
        with:
          repository: EsotericSoftware/spine-runtimes
          path: spine-runtimes

      # Bevy's wgpu / winit / alsa deps need a handful of system
      # libraries even when we never actually open a window during
      # `cargo test`.
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            dm_spine_bevy
            dm_spine_runtime

      - name: cargo fmt
        working-directory: dm_spine_bevy
        run: cargo fmt --all --check

      - name: cargo clippy
        working-directory: dm_spine_bevy
        run: cargo clippy --all-targets

      - name: cargo test
        working-directory: dm_spine_bevy
        run: cargo test --all-targets
